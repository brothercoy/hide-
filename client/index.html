<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hide @$©!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            overflow: auto;
            font-family: monospace;
        }

        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }

        #game {
            display: none;
            position: relative;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 4px;
        }

        input {
            font-family: monospace;
            font-size: 20px;
            padding: 10px 16px;
            border: 3px solid black;
            outline: none;
            width: 300px;
            text-align: center;
        }

        button {
            font-family: monospace;
            font-size: 20px;
            padding: 10px 24px;
            border: 3px solid black;
            background: white;
            cursor: pointer;
            width: 300px;
        }

        button:hover {
            background: black;
            color: white;
        }

        #join-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .divider {
            font-size: 14px;
            color: #999;
        }

        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
            font-family: monospace;
        }

        #lobby-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 400px;
        }

        #room-code-display {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
        }

        #player-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 300px;
        }

        #lobby-settings {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        #mode-select {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            font-family: monospace;
            font-size: 16px;
            padding: 8px 16px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            flex: 1;
            width: auto;
        }

        .mode-btn.active {
            background: black;
            color: white;
        }

        .mode-btn:hover {
            background: black;
            color: white;
        }

        #mode-description {
            font-size: 13px;
            color: #000000;
            text-align: center;
            min-height: 40px;
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-label {
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .setting-slider {
            width: 100%;
            cursor: pointer;
        }

        .speed-options {
            display: flex;
            gap: 8px;
        }

        .speed-btn {
            font-family: monospace;
            font-size: 14px;
            padding: 6px 0;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            flex: 1;
            width: auto;
        }

        .speed-btn.active {
            background: black;
            color: white;
        }

        .speed-btn:hover {
            background: black;
            color: white;
        }

        #game-over-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 60px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>HIDE</h1>
        <input id="name-input" type="text" placeholder="Enter your name" maxlength="16" />
        <button id="create-btn">Create Room</button>
        <span class="divider">— or —</span>
        <div id="join-section">
            <input id="code-input" type="text" placeholder="Room code" maxlength="6" />
            <button id="join-btn">Join Room</button>
        </div>
    </div>

    <div id="lobby" style="display:none;">
        <div id="lobby-inner">
            <h1>HIDE</h1>
            <p>Room Code: <span id="room-code-display"></span></p>
            <div id="player-list"></div>

            <div id="lobby-settings">
                <div id="mode-select">
                    <button class="mode-btn" data-mode="redacted">Redacted</button>
                    <button class="mode-btn" data-mode="frequency">Frequency</button>
                </div>
                <p id="mode-description"></p>
                <div id="settings-panel"></div>
            </div>

            <button id="start-btn">Start Game</button>
            <button id="lobby-main-menu-btn">Main Menu</button>
        </div>
    </div>

    <div id="game">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-menu" style="display:none;">
            <button id="play-again-btn">Play Again</button>
            <button id="return-lobby-btn">Return to Lobby</button>
            <button id="main-menu-btn">Main Menu</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>

    <div id="settings-panel-overlay" style="display:none; position:fixed; bottom:50px; right:16px; background:white; border:3px solid black; padding:16px; z-index:100; font-family:monospace; flex-direction:column; gap:8px;">
        <button id="settings-main-menu-btn">Main Menu</button>
    </div>
    <button id="settings-btn" style="position:fixed; bottom:16px; right:60px; width:auto; padding:8px 12px; font-size:14px; z-index:100;">⚙</button>
    <button id="fullscreen-btn" style="position:fixed; bottom:16px; right:16px; width:auto; padding:8px 12px; font-size:14px; z-index:100;">⛶</button>
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; border:3px solid black; padding:32px; font-family:monospace; text-align:center; max-width:300px;">
            <p id="modal-message" style="margin-bottom:16px; font-size:16px;"></p>
            <button id="modal-ok-btn" style="width:auto; padding:8px 24px;">OK</button>
        </div>
    </div>
</body>
</html>
