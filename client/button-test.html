<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Button Test — Spring</title>
    <style>
        @font-face {
            font-family: 'IBMVGA';
            src: url('PxPlus_IBM_VGA_8x16.ttf') format('truetype');
            font-display: block;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const FONT_SIZE = 46;
const FONT = `${FONT_SIZE}px "IBMVGA"`;
const ANIM_DURATION = 333;
const CURSOR_BLINK_RATE = 500;

// Z constants
const Z_REST     = 1.0;   // resting z — fully visible, no depth
const Z_PRESSED  = 2.5;   // max z when held down
const Z_PRESS_SPEED = 0.007;

// Spring constants
const SPRING_K       = 0.001;  // spring stiffness — higher = faster return
const SPRING_DAMPING = 0.9;   // velocity multiplier per frame — lower = more bouncy
const SPRING_THRESHOLD = 0.0008; // stop spring when close enough

// Glow
const GLOW_SPEED = 0.002;

function zToScale(z) {
    const t = (z - 1.0) / (3.0 - 1.0);
    return Math.max(0.5, 1.0 - t * 0.5);
}
function zToAlpha(z) {
    const t = (z - 1.0) / (3.0 - 1.0);
    return Math.max(0, 1.0 - t);
}

document.fonts.ready.then(() => {
    ctx.font = FONT;
    initButtons();
    initSliders();
    initInputs();
    loop();
});

const buttons = [];
const sliders = [];
const inputs  = [];
let mouseX = 0, mouseY = 0;
let dragging = null;
let elapsed = 0;
let focusedInput = null;
let pressedButton = null;
let mouseIsDown = false;

function makeButton(label, x, y, onClick, options = {}) {
    return {
        label, x, y, onClick,
        hoverProgress: 0,
        rect: null, fullRect: null,
        phase: Math.random() * Math.PI * 2,
        active:   options.active   || false,
        plain:    options.plain    || false,
        disabled: options.disabled || false,
        // per-character spring state
        charPhases: null,   // random phases (unused for oscillation, kept for future)
        charZ:    null,     // per-char z positions
        charV:    null,     // per-char z velocities
        z:        Z_REST,   // whole-button z (used during press)
        releasePhase: null, // 'springing' | 'glowing' | null
        glowT:    0,
        _fireClick: false,
    };
}

function makeInput(placeholder, x, y, maxLength) {
    return {
        placeholder, x, y, maxLength,
        value: '', focused: false, rect: null,
        phase: Math.random() * Math.PI * 2,
        cursorVisible: true, lastBlink: performance.now(),
        cursorPos: 0, selStart: 0, selEnd: 0, selecting: false,
        z: Z_REST,
    };
}

function initButtons() {
    buttons.push(makeButton('CREATE ROOM', canvas.width/2, canvas.height/2-60,  () => console.log('Create')));
    buttons.push(makeButton('JOIN ROOM',   canvas.width/2, canvas.height/2+80,  () => console.log('Join')));
    buttons.push(makeButton('SETTINGS',    canvas.width/2, canvas.height/2+220, () => console.log('Settings')));
}

function initSliders() {
    sliders.push({
        label: 'ROUND TIME', value: 30, min: 1, max: 60,
        x: canvas.width/2, y: canvas.height/2+360,
        rect: null, phase: Math.random()*Math.PI*2, z: Z_REST
    });
}

function initInputs() {
    inputs.push(makeInput('ENTER NAME', canvas.width/2, canvas.height/2-200, 12));
}

// ── drawChar ─────────────────────────────────────────────────────────────────
function drawChar(char, x, y, z, color, fs) {
    const scale = zToScale(z);
    const alpha = zToAlpha(z);
    const fontSize = fs || FONT_SIZE;
    ctx.font = `${fontSize}px "IBMVGA"`;
    const fw = ctx.measureText('M').width;
    ctx.font = `${fontSize * scale}px "IBMVGA"`;
    const sw = ctx.measureText('M').width;
    const xShift = (fw - sw) / 2;
    const yShift = (fontSize - fontSize * scale) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color || '#00ff41';
    ctx.fillText(char, x + xShift, y + yShift);
    ctx.font = `${fontSize}px "IBMVGA"`;
}

// ── Button ────────────────────────────────────────────────────────────────────
function getCharZForBtn(btn, ci) {
    if (btn.charZ && btn.releasePhase === 'springing') return btn.charZ[ci];
    return btn.z;
}

function drawButton(btn) {
    ctx.font = FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const cw = ctx.measureText('M').width;
    const textWidth = ctx.measureText(btn.label).width;
    const padX = cw * 2;
    const innerWidth = textWidth + padX * 2;
    const borderWidth = innerWidth + cw * 2;
    const lh = FONT_SIZE;
    const totalHeight = lh * 2.5;
    const sl = btn.x - borderWidth / 2;
    const st = btn.y - totalHeight / 2;
    const dashCount = Math.floor(innerWidth / cw);
    const plusCount = Math.floor((dashCount / 2) * (btn.active ? 1 : btn.hoverProgress));

    let borderLine = '';
    for (let i = 0; i < dashCount; i++) {
        const fl = i, fr = dashCount - 1 - i;
        borderLine += (fl < plusCount || fr < plusCount ||
            (dashCount % 2 === 1 && i === Math.floor(dashCount/2) && plusCount >= Math.floor(dashCount/2)))
            ? '+' : '-';
    }
    const topB = '+' + borderLine + '+';
    const botB = '+' + borderLine + '+';
    const isPressed = btn === pressedButton && mouseIsDown;
    const ls = isPressed ? '}' : (btn.active ? (Math.floor(Date.now()/500)%2===0?'}':' ') : '|');
    const rs = isPressed ? '{' : (btn.active ? (Math.floor(Date.now()/500)%2===0?'{':' ') : '|');

    if (!btn.charPhases) {
        btn.charPhases = Array.from({length: 200}, () => Math.random() * Math.PI * 2);
    }

    let glowColor = '#00ff41';
    if (btn.releasePhase === 'glowing' && btn.glowT > 0) {
        const g = btn.glowT < 0.5 ? btn.glowT * 2 : (1 - btn.glowT) * 2;
        glowColor = `rgb(${Math.round(g * 170)}, 255, ${Math.round(65 + g * 121)})`;
    }

    let ci = 0;
    for (let i = 0; i < topB.length; i++, ci++)
        drawChar(topB[i], sl+i*cw, st, getCharZForBtn(btn, ci), glowColor);
    drawChar(ls, sl, st+lh, getCharZForBtn(btn, ci++), glowColor);
    for (let i = 0; i < btn.label.length; i++, ci++)
        drawChar(btn.label[i], sl+cw+padX+i*cw, st+lh, getCharZForBtn(btn, ci), glowColor);
    drawChar(rs, sl+borderWidth-cw, st+lh, getCharZForBtn(btn, ci++), glowColor);
    for (let i = 0; i < botB.length; i++, ci++)
        drawChar(botB[i], sl+i*cw, st+lh*2, getCharZForBtn(btn, ci), glowColor);

    // Glow — duplicate pass at glowing alpha
    if (btn.releasePhase === 'glowing' && btn.glowT > 0) {
        const glowAlpha = btn.glowT < 0.5 ? btn.glowT * 2 : (1 - btn.glowT) * 2;
        ci = 0;
        const restoreAlpha = ctx.globalAlpha;
        for (let i = 0; i < topB.length; i++, ci++) { ctx.globalAlpha = glowAlpha; drawChar(topB[i], sl+i*cw, st, Z_REST, '#00ff41'); }
        ctx.globalAlpha = glowAlpha; drawChar(ls, sl, st+lh, Z_REST, '#00ff41'); ci++;
        for (let i = 0; i < btn.label.length; i++, ci++) { ctx.globalAlpha = glowAlpha; drawChar(btn.label[i], sl+cw+padX+i*cw, st+lh, Z_REST, '#00ff41'); }
        ctx.globalAlpha = glowAlpha; drawChar(rs, sl+borderWidth-cw, st+lh, Z_REST, '#00ff41'); ci++;
        for (let i = 0; i < botB.length; i++, ci++) { ctx.globalAlpha = glowAlpha; drawChar(botB[i], sl+i*cw, st+lh*2, Z_REST, '#00ff41'); }
    }

    ctx.globalAlpha = 1;
    ctx.font = FONT;
    btn.rect = btn.fullRect = { x: sl, y: st, w: borderWidth, h: totalHeight };
}

// ── Input ─────────────────────────────────────────────────────────────────────
function drawInput(inp) {
    ctx.font = FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const cw = ctx.measureText('M').width;
    const refW = ctx.measureText(inp.placeholder).width;
    const padX = cw * 2;
    const innerWidth = refW + padX * 2;
    const borderWidth = innerWidth + cw * 2;
    const lh = FONT_SIZE;
    const totalHeight = lh * 2.5;
    const sl = inp.x - borderWidth / 2;
    const st = inp.y - totalHeight / 2;
    const textY = st + lh;
    const centerX = sl + borderWidth / 2;
    const dashCount = Math.floor(innerWidth / cw);
    const topB = '+' + '-'.repeat(dashCount) + '+';
    const botB = '+' + '-'.repeat(dashCount) + '+';
    const borderColor = inp.focused ? '#00ff41' : '#007a1f';

    for (let i = 0; i < topB.length; i++)
        drawChar(topB[i], sl+i*cw, st, Z_REST, borderColor);
    drawChar('|', sl, textY, Z_REST, borderColor);
    drawChar('|', sl+borderWidth-cw, textY, Z_REST, borderColor);
    for (let i = 0; i < botB.length; i++)
        drawChar(botB[i], sl+i*cw, st+lh*2, Z_REST, borderColor);

    const hasSelection = inp.selStart !== inp.selEnd;
    const totalTextWidth = inp.value.length === 0 ? 0 : ctx.measureText(inp.value).width;
    const textStartX = inp.value.length === 0 ? centerX - cw/2 : centerX - totalTextWidth/2;

    if (inp.value.length === 0 && !inp.focused) {
        const phW = ctx.measureText(inp.placeholder).width;
        const phX = centerX - phW / 2;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#003d0f';
        ctx.fillText(inp.placeholder, phX, textY);
    } else if (hasSelection && inp.focused) {
        const selMin = Math.min(inp.selStart, inp.selEnd);
        const selMax = Math.max(inp.selStart, inp.selEnd);
        const selX = textStartX + ctx.measureText(inp.value.slice(0, selMin)).width;
        const selW = ctx.measureText(inp.value.slice(selMin, selMax)).width;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(selX, textY, selW, FONT_SIZE - 4);
        ctx.fillStyle = 'black';
        ctx.fillText(inp.value.slice(selMin, selMax), selX, textY);
        ctx.fillStyle = '#00ff41';
        ctx.fillText(inp.value.slice(0, selMin), textStartX, textY);
        ctx.fillText(inp.value.slice(selMax), selX + selW, textY);
    } else {
        ctx.globalAlpha = 1;
        ctx.fillStyle = inp.focused ? '#00ff41' : '#007a1f';
        ctx.fillText(inp.value, textStartX, textY);
    }

    if (inp.focused && inp.cursorVisible && !hasSelection) {
        const cursorX = textStartX + ctx.measureText(inp.value.slice(0, inp.cursorPos)).width;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(cursorX, textY, cw - 2, FONT_SIZE - 4);
        const charUnder = inp.value[inp.cursorPos];
        if (charUnder) {
            ctx.fillStyle = 'black';
            ctx.fillText(charUnder, cursorX, textY);
        }
    }

    ctx.globalAlpha = 1;
    ctx.font = FONT;
    inp.rect = { x: sl, y: st, w: borderWidth, h: totalHeight, textStartX, charWidth: cw };
}

// ── Slider ────────────────────────────────────────────────────────────────────
function drawSlider(s) {
    ctx.font = FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const cw = ctx.measureText('M').width;
    const totalChars = 20;
    const trackWidth = totalChars * cw;
    const totalWidth = trackWidth + cw * 2;
    const left = s.x - totalWidth / 2;
    const t = (s.value - s.min) / (s.max - s.min);
    const handlePos = Math.min(Math.floor(t * totalChars), totalChars - 2);

    const chars = ['|'];
    for (let i = 0; i < totalChars; i++) {
        if (i === handlePos) chars.push('[');
        else if (i === handlePos + 1) chars.push(']');
        else chars.push(i < handlePos ? '=' : '-');
    }
    chars.push('|');

    ctx.globalAlpha = 1;
    ctx.fillStyle = '#00ff41';
    ctx.fillText(s.label + ': ' + s.value, left, s.y - FONT_SIZE);

    const trackStartX = left - cw;
    for (let i = 0; i < chars.length; i++)
        drawChar(chars[i], trackStartX + i*cw, s.y, Z_REST, '#00ff41');

    ctx.globalAlpha = 1;
    ctx.font = FONT;
    s.rect = { x: left, y: s.y - FONT_SIZE/2, w: totalWidth, h: FONT_SIZE*2, totalChars, left, trackWidth };
}

// ── Update ────────────────────────────────────────────────────────────────────
let lastTime = performance.now();

function updateButton(btn, dt, now) {
    const r = btn.fullRect || btn.rect;
    const over = r && mouseX>=r.x && mouseX<=r.x+r.w && mouseY>=r.y && mouseY<=r.y+r.h;
    const isPressed = btn === pressedButton && mouseIsDown && over;

    if (isPressed) {
        // Sink deeper the longer you hold
        btn.z = Math.min(Z_PRESSED, btn.z + dt * Z_PRESS_SPEED);
        // Keep all chars synced to btn.z during press
        if (btn.charZ) {
            btn.charZ.fill(btn.z);
            btn.charV.fill(0);
        }
    } else if (btn.releasePhase === 'springing') {
        // Spring each char back to Z_REST
        let allSettled = true;
        for (let i = 0; i < 200; i++) {
            const force = (Z_REST - btn.charZ[i]) * SPRING_K * dt;
            btn.charV[i] = (btn.charV[i] + force) * SPRING_DAMPING;
            btn.charZ[i] += btn.charV[i] * dt;
            if (Math.abs(btn.charZ[i] - Z_REST) > SPRING_THRESHOLD || Math.abs(btn.charV[i]) > 0.0001) {
                allSettled = false;
            }
        }
        if (allSettled) {
            btn.charZ.fill(Z_REST);
            btn.charV.fill(0);
            btn.releasePhase = 'glowing';
            btn.glowT = 0;
        }
    } else if (btn.releasePhase === 'glowing') {
        btn.glowT += dt * GLOW_SPEED;
        if (btn.glowT >= 1.0) {
            btn.glowT = 0;
            btn.releasePhase = null;
            btn._fireClick = true;
            btn.charZ = null;
            btn.charV = null;
            btn.z = Z_REST;
        }
    } else {
        // Idle — snap z back if somehow elevated
        btn.z = Z_REST;
    }

    if (btn._fireClick) {
        btn._fireClick = false;
        btn.onClick();
    }
}

function update(now) {
    const dt = now - lastTime;
    lastTime = now;
    elapsed += dt / 1000;

    buttons.forEach(btn => {
        const inside = btn.rect && mouseX>=btn.rect.x && mouseX<=btn.rect.x+btn.rect.w && mouseY>=btn.rect.y && mouseY<=btn.rect.y+btn.rect.h;
        btn.hoverProgress = inside
            ? Math.min(1, btn.hoverProgress + dt / ANIM_DURATION)
            : Math.max(0, btn.hoverProgress - dt / ANIM_DURATION);
        updateButton(btn, dt, now);
    });

    inputs.forEach(inp => {
        if (inp.focused && now - inp.lastBlink > CURSOR_BLINK_RATE) {
            inp.cursorVisible = !inp.cursorVisible;
            inp.lastBlink = now;
        }
    });
}

// ── Rotate-device prompt preview ───────────────────────────────────────────────
// The loop is drawn glyph-by-glyph, each centered by its ACTUAL INK (not its cell) so a '.'
// and a "'" land exactly where you place them. Each entry is [char, x, y] as an offset from
// the icon centre, in fractions of size S: x = left(-)/right(+), y = up(-)/down(+). Because
// it's ink-centered, symmetric x-values (e.g. ±0.40) are truly equidistant, and same-y values
// sit level. Nudge any single glyph without touching the rest.
const ROTATE_PARTS = [
    ['.', -0.40, -0.42],   // top-left
    ['-',  0.00, -0.55],   // top
    ['.',  0.40, -0.42],   // top-right
    ['(', -0.66,  0.00],   // left side
    [')',  0.66,  0.00],   // right side
    ['<', -0.35,  0.66],   // bottom-left  (arrow)
    ['-',  0.00,  0.66],   // bottom
    ["'",  0.40,  0.48],   // bottom-right
];

// Measure a glyph's ink-CENTER offset from its fillText origin (textBaseline 'top') so we can
// place the ink — not the cell — exactly. We only MEASURE offscreen; we RENDER with the main
// canvas' fillText so the font is always correct. Cache the offset only once IBMVGA is loaded,
// so an early fallback measurement doesn't get stuck.
const _inkOffsetCache = {};
function inkOffset(ch, fs) {
    const key = ch + '|' + fs;
    if (_inkOffsetCache[key]) return _inkOffsetCache[key];
    const pad = Math.ceil(fs), w = pad * 3, h = pad * 3;
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const g = cv.getContext('2d');
    g.font = `${fs}px "IBMVGA"`;
    g.textAlign = 'left'; g.textBaseline = 'top';
    g.fillStyle = '#fff';
    g.fillText(ch, pad, pad);
    const d = g.getImageData(0, 0, w, h).data;
    let x0 = w, y0 = h, x1 = -1, y1 = -1;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
        if (d[(y * w + x) * 4 + 3] > 20) { if (x < x0) x0 = x; if (x > x1) x1 = x; if (y < y0) y0 = y; if (y > y1) y1 = y; }
    }
    if (x1 < 0) { x0 = x1 = pad; y0 = y1 = pad; }   // blank glyph
    const res = { cx: (x0 + x1) / 2 - pad, cy: (y0 + y1) / 2 - pad };
    if (document.fonts.check(`${fs}px "IBMVGA"`)) _inkOffsetCache[key] = res;   // cache only once the real font is loaded
    return res;
}

// ── Dim-step animation (preview only — copy into RotateGate.js if it looks good) ──
// A bright window SNAPS around the loop in discrete steps (no gradient). One full cycle:
//   all bright (held long) → all dim → 1st glyph → 1st+2nd → 2nd+3rd → … (a GROUP-wide window
//   sliding around the ring) → last glyph → all dim → back to all bright, repeat.
const GROUP         = 2;      // how many glyphs are lit in the sliding window
const STEP_MS       = 260;    // hold time per animation step (snap cadence — raise to slow down)
const ALL_BRIGHT_MS = 1400;   // how long the fully-bright frame lingers before the cycle restarts
const DIM_MIN       = 0.18;   // dim glyph brightness (0..1)
const DIM_MAX       = 1.0;    // bright glyph brightness (0..1)
const START_CHAR    = '(';    // glyph the window starts on; it then travels around, ending one before it

// Clockwise position [0,1) of an (x,y) offset around the loop, starting from the top.
function loopPos(x, y) {
    return ((Math.atan2(x, -y) / (Math.PI * 2)) + 1) % 1;
}
// Dim the phosphor green (#00ff41) by a 0..1 factor.
function dimGreen(b) {
    return `rgb(0, ${Math.round(255 * b)}, ${Math.round(65 * b)})`;
}

// Ring slots: glyphs ordered CLOCKWISE, then ROTATED so slot 0 is START_CHAR ('('). slotOf[i] is the
// slot of ROTATE_PARTS[i]. This is why the window starts on '(' and ends on the bottom-left '<'
// (the glyph just before '(' going clockwise) rather than top → top-left.
const _cw = ROTATE_PARTS
    .map(([ch, x, y], i) => ({ i, p: loopPos(x, y) }))
    .sort((a, b) => a.p - b.p)
    .map(o => o.i);
const _startAt = _cw.indexOf(ROTATE_PARTS.findIndex(([ch]) => ch === START_CHAR));
const cwOrder = _cw.slice(_startAt).concat(_cw.slice(0, _startAt));
const slotOf = [];
cwOrder.forEach((partIdx, slot) => { slotOf[partIdx] = slot; });

// Ordered list of lit-slot sets, one per step. `null` = ALL lit; [] = all dim.
function buildSteps(n, group) {
    const steps = [null, []];                             // all bright, then all dim
    for (let head = 0; head <= n + group - 1; head++) {   // width-`group` window slides in and out
        const set = [];
        for (let k = 0; k < group; k++) {
            const s = head - k;
            if (s >= 0 && s < n) set.push(s);
        }
        steps.push(set);                                  // final iteration is [] → "last glyph now dim"
    }
    return steps;
}
const STEPS = buildSteps(ROTATE_PARTS.length, GROUP);

// Per-step hold time — the all-bright frame (step 0) lingers; every other step uses STEP_MS.
const _durations = STEPS.map((s, i) => (i === 0 ? ALL_BRIGHT_MS : STEP_MS));
const _cycleMs = _durations.reduce((a, b) => a + b, 0);
function currentStep() {
    let t = (elapsed * 1000) % _cycleMs;
    for (let i = 0; i < STEPS.length; i++) {
        if (t < _durations[i]) return STEPS[i];
        t -= _durations[i];
    }
    return STEPS[STEPS.length - 1];
}

// Is ROTATE_PARTS[i] lit this frame?
function rotateLit(i) {
    const step = currentStep();
    return step === null || step.includes(slotOf[i]);
}

function drawRotateIcon(cx, cy, S, color) {
    ctx.font = `${S}px "IBMVGA"`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.globalAlpha = 1;
    ROTATE_PARTS.forEach(([ch, x, y], i) => {
        const o = inkOffset(ch, S);
        ctx.fillStyle = dimGreen(rotateLit(i) ? DIM_MAX : DIM_MIN);   // snap: bright or dim
        ctx.fillText(ch, cx + x * S - o.cx, cy + y * S - o.cy);       // place ink center at (x,y)
    });
}

function drawRotatePreview() {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const S = 150;   // icon size
    drawRotateIcon(cx, cy - 40, S, '#00ff41');

    ctx.font = `64px "IBMVGA"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#00ff41';
    ctx.globalAlpha = 1;
    ctx.fillText('ROTATE DEVICE', cx, cy - 40 + S * 1.15);
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
    const now = performance.now();
    update(now);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Rotate-prompt preview. Comment this out and restore the three lines below to test buttons.
    drawRotatePreview();
    // inputs.forEach(inp => drawInput(inp));
    // buttons.forEach(btn => drawButton(btn));
    // sliders.forEach(s => drawSlider(s));

    requestAnimationFrame(loop);
}

// ── Events ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
    if (dragging) {
        const dr = dragging.rect;
        dragging.value = Math.round(dragging.min + Math.max(0,Math.min(1,(mouseX-dr.left)/dr.trackWidth))*(dragging.max-dragging.min));
    }
    if (focusedInput && focusedInput.selecting) {
        const idx = getCharIndex(focusedInput, mouseX);
        focusedInput.selEnd = idx;
        focusedInput.cursorPos = idx;
    }
});

canvas.addEventListener('mousedown', e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    mouseIsDown = true;
    pressedButton = null;

    buttons.forEach(btn => {
        if (btn.rect && mx>=btn.rect.x && mx<=btn.rect.x+btn.rect.w && my>=btn.rect.y && my<=btn.rect.y+btn.rect.h)
            pressedButton = btn;
    });

    let clickedInput = null;
    inputs.forEach(inp => {
        if (inp.rect && mx>=inp.rect.x && mx<=inp.rect.x+inp.rect.w && my>=inp.rect.y && my<=inp.rect.y+inp.rect.h)
            clickedInput = inp;
    });
    inputs.forEach(inp => {
        inp.focused = inp === clickedInput;
        if (inp === clickedInput) {
            const idx = getCharIndex(inp, mx);
            inp.cursorPos = idx; inp.selStart = idx; inp.selEnd = idx; inp.selecting = true;
        }
        inp.cursorVisible = true; inp.lastBlink = performance.now();
    });
    focusedInput = clickedInput;

    sliders.forEach(s => {
        if (s.rect && mx>=s.rect.x && mx<=s.rect.x+s.rect.w && my>=s.rect.y && my<=s.rect.y+s.rect.h)
            dragging = s;
    });
});

canvas.addEventListener('mouseup', e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    mouseIsDown = false;

    if (pressedButton) {
        const btn = pressedButton;
        const stillOver = btn.rect && mx>=btn.rect.x && mx<=btn.rect.x+btn.rect.w && my>=btn.rect.y && my<=btn.rect.y+btn.rect.h;
        if (stillOver) {
            // Initialize per-char spring from current press depth
            // Each char gets slightly different starting velocity for organic feel
            const pressDepth = btn.z - Z_REST;
            btn.charZ = new Array(200).fill(0).map(() => btn.z);
            btn.charV = new Array(200).fill(0).map(() =>
                pressDepth * 0.02 * (0.8 + Math.random() * 0.4)
            );
            btn.releasePhase = 'springing';
        }
        pressedButton = null;
    }

    dragging = null;
    if (focusedInput) focusedInput.selecting = false;
});

function getCharIndex(inp, mx) {
    if (!inp.rect) return 0;
    ctx.font = FONT;
    const tx = inp.rect.textStartX;
    let closest = 0, closestDist = Infinity;
    for (let i = 0; i <= inp.value.length; i++) {
        const x = tx + ctx.measureText(inp.value.slice(0,i)).width;
        const d = Math.abs(mx-x);
        if (d < closestDist) { closestDist = d; closest = i; }
    }
    return closest;
}

window.addEventListener('keydown', e => {
    if (!focusedInput) return;
    const inp = focusedInput;
    const hasSel = inp.selStart !== inp.selEnd;
    if (e.key === 'Backspace') {
        if (hasSel) { const a=Math.min(inp.selStart,inp.selEnd),b=Math.max(inp.selStart,inp.selEnd); inp.value=inp.value.slice(0,a)+inp.value.slice(b); inp.cursorPos=a; inp.selStart=a; inp.selEnd=a; }
        else if (inp.cursorPos>0) { inp.value=inp.value.slice(0,inp.cursorPos-1)+inp.value.slice(inp.cursorPos); inp.cursorPos--; inp.selStart=inp.cursorPos; inp.selEnd=inp.cursorPos; }
    } else if (e.key==='ArrowLeft') {
        e.preventDefault(); inp.cursorPos=Math.max(0,inp.cursorPos-1);
        if (e.shiftKey) inp.selEnd=inp.cursorPos; else { inp.selStart=inp.cursorPos; inp.selEnd=inp.cursorPos; }
    } else if (e.key==='ArrowRight') {
        e.preventDefault(); inp.cursorPos=Math.min(inp.value.length,inp.cursorPos+1);
        if (e.shiftKey) inp.selEnd=inp.cursorPos; else { inp.selStart=inp.cursorPos; inp.selEnd=inp.cursorPos; }
    } else if (e.key==='Tab'||e.key==='ArrowDown') {
        e.preventDefault(); const idx=inputs.indexOf(inp),next=inputs[(idx+1)%inputs.length];
        inp.focused=false; next.focused=true; next.cursorVisible=true; next.lastBlink=performance.now(); focusedInput=next;
    } else if (e.key.length===1&&!e.ctrlKey&&!e.metaKey) {
        if (hasSel) { const a=Math.min(inp.selStart,inp.selEnd),b=Math.max(inp.selStart,inp.selEnd); inp.value=inp.value.slice(0,a)+e.key.toUpperCase()+inp.value.slice(b); inp.cursorPos=a+1; }
        else if (inp.value.length<inp.maxLength) { inp.value=inp.value.slice(0,inp.cursorPos)+e.key.toUpperCase()+inp.value.slice(inp.cursorPos); inp.cursorPos++; }
        inp.selStart=inp.cursorPos; inp.selEnd=inp.cursorPos; inp.cursorVisible=true; inp.lastBlink=performance.now();
    }
});
</script>
