<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hide @$©!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            overflow: hidden;
            font-family: monospace;
        }

        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }

        #game {
            display: none;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 4px;
        }

        input {
            font-family: monospace;
            font-size: 20px;
            padding: 10px 16px;
            border: 3px solid black;
            outline: none;
            width: 300px;
            text-align: center;
        }

        button {
            font-family: monospace;
            font-size: 20px;
            padding: 10px 24px;
            border: 3px solid black;
            background: white;
            cursor: pointer;
            width: 300px;
        }

        button:hover {
            background: black;
            color: white;
        }

        #join-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .divider {
            font-size: 14px;
            color: #999;
        }

        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
            font-family: monospace;
        }

        #lobby-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #room-code-display {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
        }

        #player-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 300px;
        }

    </style>
</head>
<body>
    <div id="menu">
        <h1>HIDE</h1>
        <input id="name-input" type="text" placeholder="Enter your name" maxlength="16" />
        <button id="create-btn">Create Room</button>
        <span class="divider">— or —</span>
        <div id="join-section">
            <input id="code-input" type="text" placeholder="Room code" maxlength="6" />
            <button id="join-btn">Join Room</button>
        </div>
    </div>

    <div id="lobby" style="display:none;">
        <div id="lobby-inner">
            <h1>HIDE</h1>
            <p>Room Code: <span id="room-code-display"></span></p>
            <div id="player-list"></div>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <div id="game">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://unpkg.com/colyseus.js@0.15.0/dist/colyseus.js"></script>
    <script src="game.js"></script>
</body>
</html>
